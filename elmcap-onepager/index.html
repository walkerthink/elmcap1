<!doctype html>
<html lang="en">
      <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Elm Capital</title>
          <meta name="description" content="Elm Capital — Institutional-grade multi-asset investment strategies." />
          <link rel="preconnect" href="https://fonts.googleapis.com" />
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
          <style>
                    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

                    :root {
                                --bg:        #0c0c10;
                                --surface:   #13131a;
                                --border:    rgba(255,255,255,0.07);
                                --gold:      #c9a84c;
                                --gold-dim:  rgba(201,168,76,0.15);
                                --fg:        #f0ede8;
                                --muted:     #8a8a96;
                                --body-text: #c5c2bc;
                    }

                    html, body {
                                min-height: 100%;
                                background: var(--bg);
                                color: var(--fg);
                                font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
                                font-size: 16px;
                                line-height: 1.7;
                                -webkit-font-smoothing: antialiased;
                    }

                    /* ── Layout ── */
                    .page {
                                max-width: 780px;
                                margin: 0 auto;
                                padding: 0 32px;
                    }

                    /* ── Header ── */
                    header {
                                display: flex;
                                align-items: center;
                                gap: 14px;
                                padding: 48px 0 64px;
                                border-bottom: 1px solid var(--border);
                    }

                    header img {
                                height: 44px;
                                width: auto;
                                display: block;
                                opacity: 0.95;
                    }

                    .brand-name {
                                font-family: 'DM Serif Display', Georgia, serif;
                                font-size: 26px;
                                font-weight: 400;
                                letter-spacing: 0.01em;
                                color: var(--fg);
                    }

                    /* ── Hero intro ── */
                    .intro {
                                padding: 56px 0 48px;
                                border-bottom: 1px solid var(--border);
                    }

                    .intro p {
                                font-size: 17px;
                                color: var(--body-text);
                                line-height: 1.75;
                    }

                    .intro p + p {
                                margin-top: 18px;
                    }

                    /* ── Strategies ── */
                    .strategies {
                                padding: 52px 0 0;
                    }

                    .strategies-label {
                                font-size: 11px;
                                font-weight: 500;
                                letter-spacing: 0.12em;
                                text-transform: uppercase;
                                color: var(--gold);
                                margin-bottom: 32px;
                    }

                    .strategy-grid {
                                display: grid;
                                grid-template-columns: 1fr 1fr;
                                gap: 20px;
                    }

                    .strategy-card {
                                background: var(--surface);
                                border: 1px solid var(--border);
                                border-radius: 12px;
                                padding: 28px 26px 30px;
                                position: relative;
                                overflow: hidden;
                    }

                    .strategy-card::before {
                                content: '';
                                position: absolute;
                                top: 0; left: 0; right: 0;
                                height: 2px;
                                background: linear-gradient(90deg, var(--gold), transparent);
                                opacity: 0.6;
                    }

                    .strategy-card h2 {
                                font-family: 'DM Serif Display', Georgia, serif;
                                font-size: 19px;
                                font-weight: 400;
                                color: var(--fg);
                                margin-bottom: 12px;
                                line-height: 1.3;
                    }

                    .strategy-card p {
                                font-size: 14px;
                                color: var(--body-text);
                                line-height: 1.7;
                    }

                    /* ── Philosophy ── */
                    .philosophy {
                                padding: 52px 0;
                                border-top: 1px solid var(--border);
                                margin-top: 40px;
                    }

                    .philosophy-label {
                                font-size: 11px;
                                font-weight: 500;
                                letter-spacing: 0.12em;
                                text-transform: uppercase;
                                color: var(--gold);
                                margin-bottom: 24px;
                    }

                    .philosophy p {
                                font-size: 15px;
                                color: var(--body-text);
                                line-height: 1.8;
                    }

                    .philosophy p + p {
                                margin-top: 16px;
                    }

                    /* ── Contact ── */
                    .contact {
                                padding: 36px 0 28px;
                                border-top: 1px solid var(--border);
                    }

                    .contact p {
                                font-size: 14px;
                                color: var(--muted);
                    }

                    .contact a {
                                color: var(--gold);
                                text-decoration: none;
                                font-weight: 500;
                                transition: opacity 0.15s;
                    }

                    .contact a:hover { opacity: 0.75; }

                    /* ── Footer ── */
                    footer {
                                padding: 20px 0 48px;
                                font-size: 12px;
                                color: var(--muted);
                                opacity: 0.6;
                    }

                    /* ── Responsive ── */
                    @media (max-width: 600px) {
                                .strategy-grid { grid-template-columns: 1fr; }
                                header { padding: 36px 0 48px; }
                                .intro { padding: 40px 0 36px; }
                                .strategies { padding: 40px 0 0; }
                    }
                  </style>
      </head>
      <body>
              <div class="page">

                        <header>
                                    <img src="assets/logo.png" alt="Elm Capital logo" />
                                    <span class="brand-name"></span>span>
                        </header>

                        <section class="intro" id="intro"></section>section>

                        <section class="strategies">
                                    <div class="strategies-label">Our Strategies</div>div>
                                    <div class="strategy-grid" id="strategy-grid"></div>div>
                        </section>section>

                        <section class="philosophy" id="philosophy"></section>section>

                        <div class="contact" id="contact"></div>div>
                        <footer id="footer"></footer>footer>

              </div>div>

              <!-- All text content lives in content.js — edit that file to change any wording -->
              <script src="content.js"></script>
              <script>
                        // Override the default renderer with the new layout
                        (function () {
                                    const C = SITE_CONTENT;

                                    document.querySelector('.brand-name').textContent = C.brandName;
                                    document.title = C.brandName;

                                    // Intro
                                    document.getElementById('intro').innerHTML =
                                                  `<p>${C.intro1}</p><p>${C.intro2}</p>`;

                                    // Strategy cards
                                    document.getElementById('strategy-grid').innerHTML = `
                                              <div class="strategy-card">
                                                          <h2>${C.alphaTitle}</h2>
                                                                      <p>${C.alphaBody}</p>
                                                                                </div>
                                                                                          <div class="strategy-card">
                                                                                                      <h2>${C.liquidTitle}</h2>
                                                                                                                  <p>${C.liquidBody}</p>
                                                                                                                            </div>`;

                                    // Philosophy
                                    document.getElementById('philosophy').innerHTML =
                                                  `<div class="philosophy-label">Investment Philosophy</div>
                                                             <p>${C.philosophy}</p>
                                                                        <p>${C.commitment}</p>`;

                                    // Contact
                                    document.getElementById('contact').innerHTML =
                                                  `<p>${C.contactText} <a href="mailto:${C.contactEmail}">${C.contactEmail}</a></p>`;

                                    // Footer
                                    const yr = new Date().getFullYear();
                                    document.getElementById('footer').textContent =
                                                  `© ${yr} ${C.footerCompany}. All rights reserved.`;
                        })();
              </script>
      </body>
</html>html>
              </script>
                        </header>
      </body>
          </style></title>
      </head>
